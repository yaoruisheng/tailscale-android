name: Build and Release Tailscale APK

on:
  workflow_dispatch:
    inputs:
      android_ref:
        description: 'tailscale-android 版本 (来自 Tags 页面)'
        required: true
        default: '1.94.2-t0a29cf18b-g1a1b1c9ae'
      core_ref:
        description: 'tailscale 核心库版本 (Tag 或 Branch)'
        required: true
        default: 'v1.94.2'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Actions
    permissions:
      contents: write

    steps:
      - name: Checkout Android Wrapper
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale-android
          ref: ${{ github.event.inputs.android_ref }}
          path: tailscale-android

      - name: Checkout Core Tailscale
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: ${{ github.event.inputs.core_ref }}
          path: tailscale

      - name: Checkout My Assets
        uses: actions/checkout@v4
        with:
          path: my-assets

      - name: Set up Go & Java
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Patch to Core
        run: |
          cd tailscale
          # 使用详细模式并忽略空白符差异
          patch -p1 --verbose --ignore-whitespace < ../my-assets/patches/force_standard_websocket.patch

      - name: Configure Go Replace & Tidy
        run: |
          cd tailscale-android
          go mod edit -replace tailscale.com=../tailscale
          # 锁定本地工具链进行依赖同步
          GOTOOLCHAIN=local go mod tidy

      - name: Prepare JKS
        run: |
          # 确保环境变量 JKS_BASE64 已在环境设置中
          echo "${{ secrets.JKS_BASE64 }}" | base64 -d > tailscale-android/tailscale.jks

      - name: Build APK
        env:
          JKS_PATH: ./tailscale.jks
          JKS_PASSWORD: ${{ secrets.JKS_PASSWORD }}
        run: |
          cd tailscale-android
          # 自动准备 Makefile 指定的 SDK/NDK 环境
          make androidsdk
          # 编译可安装的 APK
          cd android
          ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.android_ref }}
          name: Tailscale Android ${{ github.event.inputs.android_ref }}
          body: "Custom build with patched tailscale core."
          draft: false
          prerelease: false
          files: |
            tailscale-android/android/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
