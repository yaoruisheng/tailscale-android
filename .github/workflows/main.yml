name: Build and Release Tailscale APK

on:
  workflow_dispatch:
    inputs:
      android_ref:
        description: 'tailscale-android 版本'
        required: true
        default: '1.94.2-t0a29cf18b-g1a1b1c9ae'
      core_ref:
        description: 'tailscale 核心库版本'
        required: true
        default: 'v1.94.2'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Actions
    permissions:
      contents: write

    steps:
      - name: Checkout Android Wrapper
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale-android
          ref: ${{ github.event.inputs.android_ref }}

      - name: Checkout Core Tailscale
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: ${{ github.event.inputs.core_ref }}
          path: tailscale

      - name: Checkout My Assets
        uses: actions/checkout@v4
        with:
          path: my-assets

      - name: Set up Go & Java
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Patch & Replace
        run: |
          # 给核心库打补丁
          cd tailscale
          patch -p1 --verbose --ignore-whitespace < ../my-assets/patches/force_standard_websocket.patch
          # 配置本地替换
          cd ..
          go mod edit -replace tailscale.com=./tailscale
          GOTOOLCHAIN=local go mod tidy

      - name: Prepare JKS
        run: |
          echo "${{ secrets.JKS_BASE64 }}" | base64 -d > tailscale.jks

      - name: Build with Makefile
        env:
          # 使用绝对路径，确保在任何目录下执行都能找到 JKS
          JKS_PATH: ${{ github.workspace }}/tailscale.jks
          JKS_PASSWORD: ${{ secrets.JKS_PASSWORD }}
        run: |
          # 1. 调用 Makefile 自动下载并配置 NDK 23/SDK 34 (最省心)
          make androidsdk
          
          # 2. 调用 Makefile 生成版本文件并编译 Go 核心库 (.aar)
          # 这会自动处理 tailscale.version 和 gradle-dependencies
          make version gradle-dependencies
          
          # 3. 进入安卓目录完成最后的打包
          cd android
          ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.android_ref }}
          name: Tailscale Android ${{ github.event.inputs.android_ref }}
          body: "基于官方版本 ${{ github.event.inputs.android_ref }} 的自定义编译版。"
          files: |
            android/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
