name: Build and Release Tailscale APK

on:
  workflow_dispatch:
    inputs:
      android_ref:
        description: 'tailscale-android 版本'
        required: true
        default: '1.94.2-t0a29cf18b-g1a1b1c9ae'
      core_ref:
        description: 'tailscale 核心库版本'
        required: true
        default: 'v1.94.2'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Actions
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale-android
          ref: ${{ github.event.inputs.android_ref }}

      - name: Checkout Core Tailscale
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: ${{ github.event.inputs.core_ref }}
          path: tailscale-core

      - name: Checkout My Assets
        uses: actions/checkout@v4
        with:
          path: my-assets

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: 'gradle'

      - name: Cache Android SDK & NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/
            ~/Android/Sdk
          key: ${{ runner.os }}-android-sdk-ndk-${{ github.event.inputs.android_ref }}

      - name: Apply Patch
        run: |
          patch -p1 --verbose --ignore-whitespace < ./my-assets/patches/tailscale-android.patch
          cd tailscale-core
          patch -p1 --verbose --ignore-whitespace < ../my-assets/patches/force_standard_websocket.patch
          cd ..
          go mod edit -replace tailscale.com=./tailscale-core
          GOTOOLCHAIN=local go mod tidy

      - name: Prepare JKS
        run: |
          echo "${{ secrets.JKS_BASE64 }}" | base64 -d > tailscale.jks

      - name: Build with Make
        env:
          JKS_PATH: ${{ github.workspace }}/tailscale.jks
          JKS_PASSWORD: ${{ secrets.JKS_PASSWORD }}
        run: |
          make androidsdk
          make release-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.android_ref }}
          name: Tailscale Android ${{ github.event.inputs.android_ref }}
          body: |
            强制使用websocket的tailscale android客户端。
          files: |
            tailscale-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
