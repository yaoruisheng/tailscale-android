name: Build and Release Tailscale APK

on:
  workflow_dispatch:
    inputs:
      android_ref:
        description: 'tailscale-android 版本'
        required: true
        default: '1.94.2-t0a29cf18b-g1a1b1c9ae'
      core_ref:
        description: 'tailscale 核心库版本'
        required: true
        default: 'v1.94.2'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Actions
    permissions:
      contents: write

    steps:
      - name: Checkout Android Wrapper
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale-android
          ref: ${{ github.event.inputs.android_ref }}

      - name: Checkout Core Tailscale
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: ${{ github.event.inputs.core_ref }}
          path: tailscale-core

      - name: Checkout My Assets
        uses: actions/checkout@v4
        with:
          path: my-assets

      - name: Set up Environment (Go & Java)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Patch & Replace Logic
        run: |
          # 1. 核心库打补丁
          cd tailscale-core
          patch -p1 --verbose --ignore-whitespace < ../my-assets/patches/force_standard_websocket.patch
          cd ..
          # 2. 修改 go.mod 将远程依赖替换为本地打过补丁的路径
          go mod edit -replace tailscale.com=./tailscale-core
          GOTOOLCHAIN=local go mod tidy

      - name: Prepare JKS
        run: |
          # 将 base64 密钥还原为物理文件
          echo "${{ secrets.JKS_BASE64 }}" | base64 -d > tailscale.jks

      - name: Full Build & Sign Flow (Makefile Strict)
        env:
          JKS_PATH: ${{ github.workspace }}/tailscale.jks
          JKS_PASSWORD: ${{ secrets.JKS_PASSWORD }}
        run: |
          # A. 执行 Makefile 中的 SDK 下载 (Line 230)
          make androidsdk
          
          # B. 执行编译 AAR 依赖 (Line 106 & 112)
          # 这一步会处理 Makefile 中定义的 16KB 页对齐等底层 LDFLAGS
          make version gradle-dependencies build-unstripped-aar
          
          # C. 调用 Gradle 编译生成的 APK
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
          # D. 自动化签名逻辑 (复刻 Makefile Line 128)
          # 获取 JKS 里的 Alias（别名），防止硬编码 'tailscale' 导致签名损坏
          ALIAS=$(keytool -list -v -keystore ../tailscale.jks -storepass "${JKS_PASSWORD}" | grep "Alias name:" | head -n 1 | cut -d' ' -f3)
          # 寻找构建工具中的 zipalign
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | sort -r | head -n 1)
          
          echo "Using Alias: $ALIAS"
          echo "Using Zipalign: $ZIPALIGN"

          

          find build/outputs/apk/release/ -name "*unsigned.apk" | while read unsigned_apk; do
            aligned_apk=$(echo "$unsigned_apk" | sed 's/-unsigned/-aligned/')
            final_apk=$(echo "$unsigned_apk" | sed 's/-unsigned//')
            
            # 1. 先对齐 (V1 签名必须在对齐之后)
            echo "Aligning $unsigned_apk..."
            $ZIPALIGN -v 4 "$unsigned_apk" "$aligned_apk"
            
            # 2. 签名 (严格复刻 Makefile 第 128 行参数)
            echo "Signing with jarsigner..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore ../tailscale.jks \
              -storepass "${JKS_PASSWORD}" \
              -keypass "${JKS_PASSWORD}" \
              -signedjar "$final_apk" \
              "$aligned_apk" \
              "$ALIAS"
            
            # 清理中间文件
            rm "$unsigned_apk" "$aligned_apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.android_ref }}-${{ github.run_number }}
          name: Tailscale Android ${{ github.event.inputs.android_ref }}
          body: |
            Tailscale Android 补丁版编译成功。
            - 核心库路径替换: `tailscale.com -> ./tailscale-core`
            - WebSocket 补丁: 已应用
          files: |
            android/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
