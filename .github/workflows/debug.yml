name: Build Debug Tailscale APK

on:
  workflow_dispatch:
    inputs:
      android_ref:
        description: 'tailscale-android 版本'
        required: true
        default: '1.94.2-t0a29cf18b-g1a1b1c9ae'
      core_ref:
        description: 'tailscale 核心库版本'
        required: true
        default: 'v1.94.2'

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale-android
          ref: ${{ github.event.inputs.android_ref }}

      - name: Checkout Core Tailscale
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: ${{ github.event.inputs.core_ref }}
          path: tailscale-core

      - name: Checkout My Assets
        uses: actions/checkout@v4
        with:
          path: my-assets

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: 'gradle'

      - name: Apply Patch & Replace Logic
        run: |
          cd tailscale-core
          patch -p1 --verbose --ignore-whitespace < ../my-assets/patches/force_standard_websocket.patch
          cd ..
          go mod edit -replace tailscale.com=./tailscale-core
          GOTOOLCHAIN=local go mod tidy

      - name: Build Debug APK via Makefile
        run: |
          # 执行官方 CI 同款指令
          make androidsdk
          # 这一步会产出 tailscale-debug.apk
          make tailscale-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-debug
          path: tailscale-debug.apk
